<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Downloader Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        input, select, button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .supported {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #999;
        }
        .supported span {
            display: inline-block;
            margin: 5px;
            padding: 4px 10px;
            background: #f0f0f0;
            border-radius: 20px;
        }
        .loader {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Audio Downloader Pro</h1>
        <p class="subtitle">TikTok, Instagram, YouTube থেকে অডিও ডাউনলোড করুন</p>
        
        <form id="downloadForm">
            <input type="text" id="url" name="url" placeholder="ভিডিও লিংক দিন" required>
            <select id="quality" name="quality">
                <option value="128">128 kbps (Normal)</option>
                <option value="192" selected>192 kbps (Good)</option>
                <option value="320">320 kbps (Best)</option>
            </select>
            <button type="submit">⬇️ ডাউনলোড করুন</button>
        </form>
        
        <div class="loader" id="loader"></div>
        <div class="error" id="error"></div>
        
        <div class="supported">
            <strong>✅ সাপোর্টেড প্ল্যাটফর্ম:</strong><br>
            <span>TikTok</span> <span>Instagram</span> <span>YouTube</span>
            <span>Facebook</span> <span>Twitter</span> <span>1000+ sites</span>
        </div>
    </div>

    <script>
        document.getElementById('downloadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = document.getElementById('url').value;
            const quality = document.getElementById('quality').value;
            const loader = document.getElementById('loader');
            const errorDiv = document.getElementById('error');
            const button = document.querySelector('button');
            
            loader.style.display = 'block';
            errorDiv.style.display = 'none';
            button.disabled = true;
            button.textContent = '⏳ প্রসেসিং...';
            
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `url=${encodeURIComponent(url)}&quality=${quality}`
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = 'audio.mp3';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(downloadUrl);
                } else {
                    const error = await response.text();
                    errorDiv.textContent = 'Error: ' + error;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                button.disabled = false;
                button.textContent = '⬇️ ডাউনলোড করুন';
            }
        });
    </script>
</body>
</html>
